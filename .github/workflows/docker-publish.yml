name: Build & Publish to Docker Hub

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:  # permite disparar manualmente pelo GitHub

env:
  IMAGE_NAME: salonmanager

jobs:
  build-and-push:
    name: Build e Push para Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extrair metadados (tags e labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag "latest" sempre que houver push na branch main
            type=raw,value=latest,enable={{is_default_branch}}
            # Tags semânticas automáticas: v1.0.0 → 1.0.0, 1.0, 1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Tag com o hash curto do commit
            type=sha,prefix=sha-

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e Push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
